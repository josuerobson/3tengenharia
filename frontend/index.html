<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── SEO & Descrição ────────────────────────────────────────────────── -->
    <title>3T Engenharia — Sistema de Gestão</title>
    <meta name="description" content="3T Engenharia — Sistema Integrado de Gestão Operacional. Controle de veículos, ferramentas, horas e auditorias 5S." />
    <meta name="author"      content="3T Engenharia" />
    <meta name="keywords"    content="gestão operacional, controle de obras, engenharia, 3T, veículos, ferramentas, horas" />
    <meta name="robots"      content="noindex, nofollow" /><!-- App interno -->

    <!-- ── Cores e tema ───────────────────────────────────────────────────── -->
    <meta name="theme-color"              content="#00475B" />
    <meta name="msapplication-TileColor"  content="#00475B" />
    <meta name="msapplication-TileImage"  content="/icons/icon-512.png" />

    <!-- ── Ícone principal (favicon) ─────────────────────────────────────── -->
    <link rel="icon"              type="image/png"  href="/icons/icon-192.png" sizes="192x192" />
    <link rel="shortcut icon"     type="image/png"  href="/icons/icon-192.png" />

    <!-- ── PWA Manifest ───────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── iOS / Safari (Apple) ──────────────────────────────────────────── -->
    <!-- Habilita modo standalone no Safari iOS -->
    <meta name="apple-mobile-web-app-capable"           content="yes" />
    <!-- Estilo da status bar: default | black | black-translucent -->
    <meta name="apple-mobile-web-app-status-bar-style"  content="black-translucent" />
    <meta name="apple-mobile-web-app-title"             content="3T Gestão" />
    <!-- Apple Touch Icons — tamanhos usados pelo iOS para ícone na tela inicial -->
    <link rel="apple-touch-icon"                        href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152"        href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180"        href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167"        href="/icons/apple-touch-icon.png" />
    <!-- Splash screens iOS (gerados via startup-image) -->
    <!-- iPhone 14 Pro Max (430×932) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/apple-touch-icon.png"
    />
    <!-- iPhone 14 / 13 (390×844) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/apple-touch-icon.png"
    />
    <!-- iPad Pro 12.9" -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)"
      href="/icons/apple-touch-icon.png"
    />

    <!-- ── Android / Chrome ──────────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Open Graph (compartilhamento interno) ─────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="3T Engenharia — Sistema de Gestão" />
    <meta property="og:description" content="Sistema Integrado de Gestão Operacional" />
    <meta property="og:image"       content="/icons/icon-512.png" />

    <!-- ── Google Fonts ──────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
