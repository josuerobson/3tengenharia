# nginx.conf — Configuração Nginx para SPA React + PWA
# Serve o bundle estático e redireciona todas as rotas para index.html (SPA).

server {
    listen 80;
    server_name _;

    # Raiz dos arquivos estáticos
    root /usr/share/nginx/html;
    index index.html;

    # ── Compressão gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Cabeçalhos de Segurança ───────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Cache de Assets Estáticos ─────────────────────────────────────────────
    # Assets com hash no nome → cache longo (imutáveis)
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Ícones e imagens → cache moderado
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Service Worker — NUNCA cachear (deve sempre ser fresco)
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Web App Manifest — cache curto
    location = /manifest.webmanifest {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        default_type application/manifest+json;
    }

    # ── Healthcheck ───────────────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA Fallback (React Router) ───────────────────────────────────────────
    # Qualquer rota desconhecida → index.html (React Router assume o controle)
    location / {
        try_files $uri $uri/ /index.html;

        # index.html: NUNCA cachear (garante que sempre carrega a versão mais recente do SW)
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        }
    }
}
